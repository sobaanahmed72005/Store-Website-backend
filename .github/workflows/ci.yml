name: CI

# Nothing ran automatically on push/PR before this (see docs/AUDIT.md) — test suite correctness
# depended entirely on a human remembering to run `npm test` locally against a live MySQL
# instance. This runs the same suite, plus lint and a dependency audit, on every push/PR.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: czone_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      NODE_ENV: test
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ''
      DB_NAME: czone_test
      JWT_SECRET: ci-only-test-secret-not-used-anywhere-real-0123456789
      CREDENTIALS_ENCRYPTION_KEY: 7e3adc00ca9bb99dc3c9ddd80164fe8cd224f370c386b6ddc3b7c785c7dfdca5
      FRONTEND_URL: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run db:init
      - run: npm test
      - run: npm audit --omit=dev --audit-level=high
